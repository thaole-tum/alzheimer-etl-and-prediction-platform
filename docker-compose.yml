version: '3.8'

services:
  postgres:
    image: postgres:15
    container_name: alzheimer_db
    environment:
      POSTGRES_USER: thaole
      POSTGRES_PASSWORD: alzheimerpassword
      POSTGRES_DB: alzheimer_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: